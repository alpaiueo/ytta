<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Player UI</title>
    <style>
        :root {
            --bg-body: #0d1017;
            --bg-card: #161923;
            --bg-hover: #232734;
            --border-color: #2b3040;
            --text-main: #ffffff;
            --text-muted: #8b949e;
            --accent-red: #ff4d4d;
            --accent-red-bg: rgba(255, 77, 77, 0.1);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-family);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Main Container */
        .player-container {
            width: 100%;
            max-width: 900px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Header Section */
        .header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .title-row h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-red);
            border: 1px solid rgba(255, 77, 77, 0.3);
            background-color: var(--accent-red-bg);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-red);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .tags-row {
            display: flex;
            gap: 10px;
        }

        .tag {
            background-color: #232734;
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Video Area */
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            display: block;
        }

        /* Footer Section */
        .footer {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-card);
        }

        .footer-left {
            display: flex;
            align-items: center;
        }

        .source-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .source-selector select {
            background-color: #0d1017;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            width: 150px;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 16px;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-action {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .btn-action:hover {
            background-color: var(--bg-hover);
        }

        .btn-icon-only {
            padding: 8px;
        }

        /* SVGs styling */
        svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <header class="header">
            <div class="title-row">
                <h1 id="stream-title">Memuat tayangan...</h1>
                <div class="live-badge">
                    <span class="live-dot"></span> Live Now
                </div>
            </div>
            <div class="tags-row">
                <span class="tag">Soccer</span>
                <span class="tag">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.2 3.2.8-1.3-4.5-2.7V7z"/></svg>
                    Jun 20, 2026, 10:00 AM GMT+7
                </span>
            </div>
        </header>

        <div class="video-wrapper">
            <iframe 
                id="stream-frame"
                src="" 
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;" 
                scrolling="no" 
                allow="autoplay; encrypted-media; picture-in-picture; fullscreen" 
                allowfullscreen>
            </iframe>
        </div>

        <footer class="footer">
            <div class="footer-left">
                <img src="https://api.visitorbadge.io/api/visitors?path=https%3A%2F%2Fytta-lake.vercel.app&label=VISITORS&labelColor=%23232734&countColor=%23ff4d4d" alt="Visitor Count" style="margin-right: 15px; border-radius: 4px; height: 20px;">
                <div class="source-selector">
                    <label>Source:</label>
                    <select>
                        <option value="fs1">FS1</option>
                        <option value="fs2">FS2</option>
                        <option value="espn">ESPN</option>
                    </select>
                </div>
            </div>
            
            <div class="action-buttons">
                <button class="btn-action btn-icon-only" title="Refresh" onclick="fetchStreamData()">
                    <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                </button>
                <button class="btn-action">
                    <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14z"/></svg>
                    Theater
                </button>
                <button class="btn-action" id="chatBtn">
                    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/></svg>
                    <span id="chatText">Hide Chat</span>
                </button>
            </div>
        </footer>
    </div>

    <script>
        // 1. Logika Chat Toggle
        const chatBtn = document.getElementById('chatBtn');
        const chatText = document.getElementById('chatText');
        let chatHidden = false;

        chatBtn.addEventListener('click', () => {
            chatHidden = !chatHidden;
            chatText.innerText = chatHidden ? "Show Chat" : "Hide Chat";
        });

        // 2. Logika Popunder Shopee Affiliate
        let isPopunderFired = false;
        
        // GANTI TEKS DI BAWAH INI DENGAN LINK SHOPEE AFFILIATE ANDA
        const shopeeAffiliateLink = "https://s.shopee.co.id/3qKscZjs2g";

        document.addEventListener("click", function() {
            if (!isPopunderFired && shopeeAffiliateLink !== "LINK_SHOPEE_AFFILIATE_ANDA_DISINI") {
                isPopunderFired = true; 
                const popunder = window.open(shopeeAffiliateLink, "_blank");
                if (popunder) {
                    window.focus();
                }
            }
        });

        // 3. Logika Sinkronisasi Google Sheets Panel Admin
        const spreadsheetId = "1GxnFfzhnSdMthk2p4nHSNJQ4tcz0wxljNZLCMICs3uk"; 
        const csvUrl = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv&gid=0`;

        function fetchStreamData() {
            fetch(csvUrl)
                .then(response => response.text())
                .then(csvText => {
                    const lines = csvText.split('\n').map(line => line.replace(/^"|"$/g, '').trim());
                    
                    if (lines.length >= 2) {
                        const title = lines[0];
                        const embedUrl = lines[1];

                        document.getElementById('stream-title').innerText = title;
                        
                        const iframe = document.getElementById('stream-frame');
                        if (iframe.src !== embedUrl && embedUrl) {
                            iframe.src = embedUrl;
                        }
                    }
                })
                .catch(error => console.error("Gagal memuat data panel kontrol:", error));
        }

        // Ambil data pertama kali saat halaman dimuat
        fetchStreamData();

        // Cek pembaruan di Google Sheets otomatis setiap 30 detik tanpa reload halaman
        setInterval(fetchStreamData, 30000);
    </script>
</body>
</html>
