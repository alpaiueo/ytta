<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Stream Player UI</title>
    <style>
        :root {
            --bg-body: #0d1017;
            --bg-card: #161923;
            --bg-hover: #232734;
            --border-color: #2b3040;
            --text-main: #ffffff;
            --text-muted: #8b949e;
            --accent-red: #ff4d4d;
            --accent-red-bg: rgba(255, 77, 77, 0.1);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-family);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Main Container */
        .player-container {
            width: 100%;
            max-width: 900px;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Header Section */
        .header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .title-row h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-red);
            border: 1px solid rgba(255, 77, 77, 0.3);
            background-color: var(--accent-red-bg);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-red);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .tags-row {
            display: flex;
            gap: 10px;
        }

        .tag {
            background-color: #232734;
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Video Area */
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .video-top-bar, .video-bottom-bar {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 2;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
        }

        .video-bottom-bar {
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
            align-items: center;
        }

        /* Overlay Buttons */
        .overlay-btn {
            background-color: rgba(22, 25, 35, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .overlay-btn:hover {
            background-color: rgba(43, 48, 64, 0.9);
        }

        /* Bottom Controls */
        .control-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .ctrl-icon {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .ctrl-icon:hover {
            opacity: 1;
        }

        .play-square {
            width: 12px;
            height: 12px;
            background-color: white;
            border-radius: 1px;
        }

        .live-text {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            margin-left: 8px;
        }

        .live-text .live-dot {
            width: 6px;
            height: 6px;
            background-color: white;
            animation: none;
        }

        .cc-badge {
            border: 1px solid white;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
        }

        /* Footer Section */
        .footer {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-card);
        }

        .source-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .source-selector select {
            background-color: #0d1017;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            width: 150px;
            appearance: none; /* Removes native arrow */
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 16px;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-action {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .btn-action:hover {
            background-color: var(--bg-hover);
        }

        .btn-icon-only {
            padding: 8px;
        }

        /* SVGs styling */
        svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }
        .ctrl-icon svg {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <header class="header">
            <div class="title-row">
                <h1>Turkey vs Paraguay</h1>
                <div class="live-badge">
                    <span class="live-dot"></span> Live Now
                </div>
            </div>
            <div class="tags-row">
                <span class="tag">Soccer</span>

                    Jun 20, 2026, 10:00 AM GMT+7

                    <span id="unmuteText">Click to Unmute</span>
                </button>
                <button class="overlay-btn">
                    <svg viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>

            </div>

            <div class="video-bottom-bar">
                <div class="control-group">
                    <button class="ctrl-icon"><div class="play-square"></div></button>
                    <button class="ctrl-icon">
                        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2
